<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SmartFarm AI — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}

/* Full page background */
.page-bg{position:fixed;inset:0;background:url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=1920&q=85') center/cover no-repeat;z-index:0;}
.page-overlay{position:fixed;inset:0;background:rgba(4,8,4,0.62);z-index:1;}

/* Floating particles */
.particles{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden;}
.particle{position:absolute;width:5px;height:5px;border-radius:50%;background:rgba(61,186,114,0.25);animation:float linear infinite;}
@keyframes float{0%{transform:translateY(100vh) rotate(0deg);opacity:0;}10%{opacity:1;}90%{opacity:.3;}100%{transform:translateY(-100px) rotate(720deg);opacity:0;}}

/* Card */
.card{position:relative;z-index:10;background:rgba(8,12,8,0.88);border:1px solid rgba(61,186,114,0.2);border-radius:24px;padding:44px 40px 36px;width:100%;max-width:420px;backdrop-filter:blur(24px);box-shadow:0 32px 80px rgba(0,0,0,0.6),0 0 0 1px rgba(61,186,114,0.06);}

/* Logo area */
.card-logo{text-align:center;margin-bottom:28px;}
.logo-icon{display:inline-flex;align-items:center;justify-content:center;width:58px;height:58px;border-radius:16px;background:rgba(61,186,114,0.1);border:1.5px solid rgba(61,186,114,0.25);margin-bottom:14px;}
.logo-icon svg{width:32px;height:32px;}
.logo-brand{font-size:.7rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:rgba(61,186,114,0.7);margin-bottom:6px;}
.card-title{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;color:#f0ead8;line-height:1.2;}

/* Fields */
.field{margin-bottom:14px;}
.field-inner{position:relative;display:flex;align-items:center;}
.field-icon{position:absolute;left:14px;color:rgba(232,237,229,0.3);display:flex;align-items:center;}
.field-icon svg{width:17px;height:17px;}
.f-input{width:100%;padding:13px 16px 13px 44px;background:rgba(255,255,255,0.05);border:1.5px solid rgba(232,237,229,0.1);border-radius:12px;color:#e8ede5;font-family:'Inter',sans-serif;font-size:.9rem;outline:none;transition:all .25s;}
.f-input:focus{border-color:#3dba72;background:rgba(61,186,114,0.05);box-shadow:0 0 0 3px rgba(61,186,114,0.08);}
.f-input::placeholder{color:rgba(232,237,229,0.25);}
.eye-btn{position:absolute;right:13px;background:none;border:none;cursor:pointer;color:rgba(232,237,229,0.3);display:flex;padding:4px;transition:color .2s;}
.eye-btn:hover{color:#3dba72;}

/* Submit */
.submit-btn{width:100%;padding:14px;background:#3dba72;color:#060a06;border:none;border-radius:12px;font-family:'Inter',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .25s;margin-top:4px;letter-spacing:.01em;}
.submit-btn:hover{background:#2ea85e;box-shadow:0 8px 24px rgba(61,186,114,0.35);transform:translateY(-1px);}
.submit-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}

/* Divider */
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(232,237,229,0.08);}
.divider span{font-size:.75rem;color:rgba(232,237,229,0.3);white-space:nowrap;}

/* OAuth */
.oauth-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px;}
.oauth-btn{display:flex;align-items:center;justify-content:center;gap:9px;padding:12px 16px;border-radius:12px;border:1.5px solid rgba(232,237,229,0.12);background:rgba(255,255,255,0.04);color:#e8ede5;font-family:'Inter',sans-serif;font-size:.84rem;font-weight:500;cursor:pointer;transition:all .25s;}
.oauth-btn:hover{background:rgba(255,255,255,0.09);border-color:rgba(232,237,229,0.25);transform:translateY(-1px);}
.oauth-btn svg{width:17px;height:17px;flex-shrink:0;}

/* Bottom links */
.card-footer{text-align:center;margin-top:22px;}
.card-footer p{font-size:.84rem;color:rgba(232,237,229,0.38);margin-bottom:6px;}
.card-footer a{color:#3dba72;text-decoration:none;font-weight:600;}
.card-footer a:hover{text-decoration:underline;}
.card-footer .back{color:rgba(232,237,229,0.22);font-size:.78rem;}

/* Alert */
.alert{border-radius:11px;padding:11px 14px;font-size:.84rem;margin-bottom:16px;display:none;line-height:1.5;}
.alert.show{display:block;}
.alert-error{background:rgba(248,113,113,0.09);border:1px solid rgba(248,113,113,0.22);color:#fca5a5;}
.alert-success{background:rgba(61,186,114,0.09);border:1px solid rgba(61,186,114,0.22);color:#6ee7b7;}
</style>
</head>
<body>
<div class="page-bg"><video autoplay muted loop playsinline><source src="https://assets.mixkit.co/videos/preview/mixkit-hands-holding-a-green-plant-on-a-farm-1280-large.mp4" type="video/mp4"><source src="https://assets.mixkit.co/videos/preview/mixkit-wheat-field-at-sunset-1248-large.mp4" type="video/mp4"></video></div>
<div class="page-overlay"></div>

<!-- Floating particles -->
<div class="particles" id="particles"></div>

<div class="card">
  <!-- Logo -->
  <div class="card-logo">
    <div class="logo-icon">
      <svg viewBox="0 0 36 36" fill="none"><circle cx="18" cy="18" r="17" stroke="rgba(61,186,114,0.35)" stroke-width="1.2"/><path d="M18 7C13 11 9 17 10 23C12 27 16 29 18 29C20 29 24 27 26 23C27 17 23 11 18 7Z" fill="rgba(61,186,114,0.2)" stroke="#3dba72" stroke-width="1.4"/><line x1="18" y1="29" x2="18" y2="34" stroke="#3dba72" stroke-width="1.6" stroke-linecap="round"/></svg>
    </div>
    <div class="logo-brand">SmartFarm AI</div>
    <h1 class="card-title">Login</h1>
  </div>

  <div class="alert alert-error" id="err"></div>
  <div class="alert alert-success" id="suc"></div>

  <!-- Fields -->
  <div class="field">
    <div class="field-inner">
      <span class="field-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></span>
      <input class="f-input" type="email" id="loginEmail" placeholder="Email address" autocomplete="email">
    </div>
  </div>
  <div class="field">
    <div class="field-inner">
      <span class="field-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg></span>
      <input class="f-input" type="password" id="loginPass" placeholder="Password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
      <button class="eye-btn" onclick="togglePw('loginPass')" type="button"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
    </div>
  </div>

  <button class="submit-btn" id="loginBtn" onclick="doLogin()">Login</button>

  <div class="divider"><span>or continue with</span></div>

  <div class="oauth-row">
    <button class="oauth-btn" onclick="oAuth('Google')">
      <svg viewBox="0 0 24 24" width="17" height="17"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Google
    </button>
    <button class="oauth-btn" onclick="oAuth('GitHub')" style="background:rgba(255,255,255,0.06);">
      <svg viewBox="0 0 24 24" fill="currentColor" width="17" height="17"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/></svg>
      GitHub
    </button>
  </div>

  <div class="card-footer">
    <p>No account? <a href="signup.html">Create new account</a></p>
    <p><a href="#" class="back">Reset Password</a></p>
    <p style="margin-top:8px;"><a href="intro.html" class="back">← Back to Home</a></p>
  </div>
</div>

<script>
// Particles
const pc = document.getElementById('particles');
for(let i=0;i<18;i++){
  const p=document.createElement('div');p.className='particle';
  p.style.cssText=`left:${Math.random()*100}%;width:${3+Math.random()*6}px;height:${3+Math.random()*6}px;animation-duration:${8+Math.random()*14}s;animation-delay:${Math.random()*10}s;opacity:${0.1+Math.random()*0.3};`;
  pc.appendChild(p);
}
function togglePw(id){const i=document.getElementById(id);i.type=i.type==='password'?'text':'password';}
function oAuth(p){alert(p+' login coming soon! Please use email for now.');}
function showErr(m){const e=document.getElementById('err');e.textContent=m;e.classList.add('show');document.getElementById('suc').classList.remove('show');}
function showSuc(m){const e=document.getElementById('suc');e.textContent=m;e.classList.add('show');document.getElementById('err').classList.remove('show');}
async function doLogin(){
  const email=document.getElementById('loginEmail').value.trim();
  const pass=document.getElementById('loginPass').value;
  const btn=document.getElementById('loginBtn');
  if(!email||!pass){showErr('Please enter your email and password');return;}
  btn.disabled=true;btn.textContent='Logging in...';
  try{
    const res=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pass})});
    const d=await res.json();
    if(!d.success){showErr(d.message);btn.disabled=false;btn.textContent='Login';return;}
    localStorage.setItem('sf_token',d.token);
    localStorage.setItem('sf_user',JSON.stringify(d.user));
    showSuc('Welcome back, '+d.user.name+'! Redirecting...');
    setTimeout(()=>window.location.href='index.html',900);
  }catch{showErr('Connection error. Please try again.');btn.disabled=false;btn.textContent='Login';}
}
if(localStorage.getItem('sf_token'))window.location.href='index.html';
</script>
</body>
</html>
