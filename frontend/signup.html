<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SmartFarm AI — Sign Up</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow-x:hidden;}
.page-bg{position:fixed;inset:0;background:url('https://images.unsplash.com/photo-1560493676-04071c5f467b?w=1920&q=85') center/cover no-repeat;z-index:0;}
.page-overlay{position:fixed;inset:0;background:rgba(4,8,4,0.65);z-index:1;}
.particles{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden;}
.particle{position:absolute;border-radius:50%;background:rgba(61,186,114,0.2);animation:float linear infinite;}
@keyframes float{0%{transform:translateY(100vh);opacity:0;}10%{opacity:1;}90%{opacity:.2;}100%{transform:translateY(-100px);opacity:0;}}

.card{position:relative;z-index:10;background:rgba(8,12,8,0.88);border:1px solid rgba(61,186,114,0.2);border-radius:24px;padding:40px 38px 32px;width:100%;max-width:420px;backdrop-filter:blur(24px);box-shadow:0 32px 80px rgba(0,0,0,0.6);}

/* Logo */
.card-logo{text-align:center;margin-bottom:24px;}
.logo-icon{display:inline-flex;align-items:center;justify-content:center;width:54px;height:54px;border-radius:15px;background:rgba(61,186,114,0.1);border:1.5px solid rgba(61,186,114,0.25);margin-bottom:12px;}
.logo-brand{font-size:.68rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:rgba(61,186,114,0.7);margin-bottom:5px;}
.card-title{font-family:'Playfair Display',serif;font-size:1.9rem;font-weight:700;color:#f0ead8;}

/* Steps */
.steps{display:flex;align-items:center;justify-content:center;gap:6px;margin:16px 0 20px;}
.sdot{width:8px;height:8px;border-radius:50%;background:rgba(232,237,229,0.12);transition:all .3s;}
.sdot.active{background:#3dba72;width:22px;border-radius:4px;}
.sdot.done{background:rgba(61,186,114,0.4);}

/* Fields */
.field{margin-bottom:12px;}
.fi{position:relative;display:flex;align-items:center;}
.fic{position:absolute;left:13px;color:rgba(232,237,229,0.28);display:flex;}
.fic svg{width:16px;height:16px;}
.f-input{width:100%;padding:12px 16px 12px 42px;background:rgba(255,255,255,0.05);border:1.5px solid rgba(232,237,229,0.1);border-radius:12px;color:#e8ede5;font-family:'Inter',sans-serif;font-size:.88rem;outline:none;transition:all .25s;}
.f-input:focus{border-color:#3dba72;background:rgba(61,186,114,0.05);box-shadow:0 0 0 3px rgba(61,186,114,0.07);}
.f-input::placeholder{color:rgba(232,237,229,0.22);}
select.f-input{cursor:pointer;}
select.f-input option{background:#0a0f0a;color:#e8ede5;}
.eye-btn{position:absolute;right:12px;background:none;border:none;cursor:pointer;color:rgba(232,237,229,0.28);display:flex;padding:4px;}
.eye-btn:hover{color:#3dba72;}
.f-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* Crops */
.crops-wrap{margin-top:6px;}
.crops-label{font-size:.72rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:rgba(232,237,229,0.35);margin-bottom:8px;display:block;}
.crops-grid{display:flex;flex-wrap:wrap;gap:6px;}
.cpill{padding:5px 12px;border-radius:20px;border:1.5px solid rgba(232,237,229,0.1);background:rgba(255,255,255,0.03);color:rgba(232,237,229,0.4);font-size:.75rem;font-weight:500;cursor:pointer;transition:all .22s;font-family:'Inter',sans-serif;}
.cpill:hover{border-color:rgba(61,186,114,0.35);color:rgba(61,186,114,0.8);}
.cpill.sel{border-color:#3dba72;background:rgba(61,186,114,0.1);color:#3dba72;font-weight:600;}

/* Buttons */
.submit-btn{width:100%;padding:14px;background:#3dba72;color:#060a06;border:none;border-radius:12px;font-family:'Inter',sans-serif;font-size:.93rem;font-weight:700;cursor:pointer;transition:all .25s;margin-top:4px;}
.submit-btn:hover{background:#2ea85e;box-shadow:0 8px 24px rgba(61,186,114,0.3);transform:translateY(-1px);}
.submit-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.back-btn{background:none;border:none;color:rgba(232,237,229,0.3);cursor:pointer;font-family:'Inter',sans-serif;font-size:.8rem;padding:6px;transition:color .2s;display:block;margin:8px auto 0;}
.back-btn:hover{color:#3dba72;}

/* Divider + OAuth */
.divider{display:flex;align-items:center;gap:12px;margin:16px 0;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(232,237,229,0.08);}
.divider span{font-size:.73rem;color:rgba(232,237,229,0.28);}
.oauth-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.oauth-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:11px;border-radius:12px;border:1.5px solid rgba(232,237,229,0.1);background:rgba(255,255,255,0.04);color:#e8ede5;font-family:'Inter',sans-serif;font-size:.83rem;font-weight:500;cursor:pointer;transition:all .25s;}
.oauth-btn:hover{background:rgba(255,255,255,0.08);border-color:rgba(232,237,229,0.22);transform:translateY(-1px);}
.oauth-btn svg{width:16px;height:16px;flex-shrink:0;}

/* Alert + footer */
.alert{border-radius:10px;padding:10px 13px;font-size:.83rem;margin-bottom:14px;display:none;line-height:1.5;}
.alert.show{display:block;}
.alert-error{background:rgba(248,113,113,0.09);border:1px solid rgba(248,113,113,0.2);color:#fca5a5;}
.alert-success{background:rgba(61,186,114,0.09);border:1px solid rgba(61,186,114,0.2);color:#6ee7b7;}
.card-footer{text-align:center;margin-top:18px;font-size:.83rem;color:rgba(232,237,229,0.35);}
.card-footer a{color:#3dba72;text-decoration:none;font-weight:600;}
.card-footer a:hover{text-decoration:underline;}
</style>
</head>
<body>
<div class="page-bg"><video autoplay muted loop playsinline><source src="https://assets.mixkit.co/videos/preview/mixkit-hands-holding-a-green-plant-on-a-farm-1280-large.mp4" type="video/mp4"><source src="https://assets.mixkit.co/videos/preview/mixkit-wheat-field-at-sunset-1248-large.mp4" type="video/mp4"></video></div>
<div class="page-overlay"></div>
<div class="particles" id="particles"></div>

<div class="card">
  <div class="card-logo">
    <div class="logo-icon">
      <svg viewBox="0 0 36 36" fill="none" width="30" height="30"><circle cx="18" cy="18" r="17" stroke="rgba(61,186,114,0.35)" stroke-width="1.2"/><path d="M18 7C13 11 9 17 10 23C12 27 16 29 18 29C20 29 24 27 26 23C27 17 23 11 18 7Z" fill="rgba(61,186,114,0.2)" stroke="#3dba72" stroke-width="1.4"/><line x1="18" y1="29" x2="18" y2="34" stroke="#3dba72" stroke-width="1.6" stroke-linecap="round"/></svg>
    </div>
    <div class="logo-brand">SmartFarm AI</div>
    <h1 class="card-title" id="cardTitle">Sign Up</h1>
  </div>

  <!-- Step dots -->
  <div class="steps"><div class="sdot active" id="d1"></div><div class="sdot" id="d2"></div></div>

  <div class="alert alert-error" id="err"></div>
  <div class="alert alert-success" id="suc"></div>

  <!-- STEP 1 -->
  <div id="s1">
    <div class="field"><div class="fi">
      <span class="fic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
      <input class="f-input" type="text" id="rName" placeholder="Full name" autocomplete="name">
    </div></div>
    <div class="field"><div class="fi">
      <span class="fic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></span>
      <input class="f-input" type="email" id="rEmail" placeholder="Email address" autocomplete="email">
    </div></div>
    <div class="field"><div class="fi">
      <span class="fic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg></span>
      <input class="f-input" type="password" id="rPass" placeholder="Password (min 6 chars)" autocomplete="new-password">
      <button class="eye-btn" onclick="togglePw('rPass')" type="button"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
    </div></div>
    <button class="submit-btn" onclick="goS2()">Continue →</button>
    <div class="divider"><span>or continue with</span></div>
    <div class="oauth-row">
      <button class="oauth-btn" onclick="oAuth('Google')">
        <svg viewBox="0 0 24 24" width="16" height="16"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Google
      </button>
      <button class="oauth-btn" onclick="oAuth('GitHub')">
        <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/></svg>
        GitHub
      </button>
    </div>
  </div>

  <!-- STEP 2 -->
  <div id="s2" style="display:none;">
    <div class="f-row">
      <div class="field"><div class="fi">
        <span class="fic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg></span>
        <select class="f-input" id="rState" style="padding-left:42px;">
          <option>Tamil Nadu</option><option>Punjab</option><option>Maharashtra</option>
          <option>Karnataka</option><option>Uttar Pradesh</option><option>Andhra Pradesh</option>
          <option>Telangana</option><option>Gujarat</option><option>Rajasthan</option>
          <option>West Bengal</option><option>Madhya Pradesh</option><option>Haryana</option>
          <option>Bihar</option><option>Kerala</option><option>Odisha</option>
        </select>
      </div></div>
      <div class="field"><div class="fi">
        <span class="fic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg></span>
        <input class="f-input" type="text" id="rVillage" placeholder="Village / Town">
      </div></div>
    </div>
    <div class="crops-wrap">
      <span class="crops-label">Your crops (optional)</span>
      <div class="crops-grid" id="cropsGrid"></div>
    </div>
    <button class="submit-btn" id="signupBtn" onclick="doSignup()" style="margin-top:18px;">Create Account</button>
    <button class="back-btn" onclick="goS1()">← Back</button>
  </div>

  <div class="card-footer">
    <p id="footerTxt">Already have an account? <a href="login.html">Login</a></p>
    <p style="margin-top:6px;"><a href="intro.html" style="color:rgba(232,237,229,0.22);font-size:.76rem;font-weight:400;">← Back to Home</a></p>
  </div>
</div>

<script>
// Particles
const pc=document.getElementById('particles');
for(let i=0;i<18;i++){const p=document.createElement('div');p.className='particle';p.style.cssText=`left:${Math.random()*100}%;width:${3+Math.random()*5}px;height:${3+Math.random()*5}px;animation-duration:${8+Math.random()*14}s;animation-delay:${Math.random()*10}s;`;pc.appendChild(p);}

// Crops
const CROPS=['Rice','Wheat','Maize','Cotton','Groundnut','Soybean','Tomato','Onion','Potato','Sugarcane','Chilli','Turmeric','Banana','Coconut','Ragi','Jowar'];
let selCrops=[];
const cg=document.getElementById('cropsGrid');
CROPS.forEach(c=>{const p=document.createElement('span');p.className='cpill';p.textContent=c;p.onclick=()=>{const i=selCrops.indexOf(c);if(i===-1){selCrops.push(c);p.classList.add('sel');}else{selCrops.splice(i,1);p.classList.remove('sel');}};cg.appendChild(p);});

function togglePw(id){const i=document.getElementById(id);i.type=i.type==='password'?'text':'password';}
function oAuth(p){alert(p+' login coming soon! Please use email for now.');}
function showErr(m){const e=document.getElementById('err');e.textContent=m;e.classList.add('show');document.getElementById('suc').classList.remove('show');}
function showSuc(m){const e=document.getElementById('suc');e.textContent=m;e.classList.add('show');document.getElementById('err').classList.remove('show');}

function goS2(){
  const n=document.getElementById('rName').value.trim();
  const e=document.getElementById('rEmail').value.trim();
  const p=document.getElementById('rPass').value;
  if(!n){showErr('Please enter your full name');return;}
  if(!e||!e.includes('@')){showErr('Please enter a valid email');return;}
  if(p.length<6){showErr('Password must be at least 6 characters');return;}
  document.getElementById('err').classList.remove('show');
  document.getElementById('s1').style.display='none';
  document.getElementById('s2').style.display='block';
  document.getElementById('d1').classList.remove('active');document.getElementById('d1').classList.add('done');
  document.getElementById('d2').classList.add('active');
  document.getElementById('cardTitle').textContent='Your Farm';
  document.getElementById('footerTxt').innerHTML='Step 2 of 2 — almost there!';
}
function goS1(){
  document.getElementById('s2').style.display='none';
  document.getElementById('s1').style.display='block';
  document.getElementById('d2').classList.remove('active');
  document.getElementById('d1').classList.remove('done');document.getElementById('d1').classList.add('active');
  document.getElementById('cardTitle').textContent='Sign Up';
  document.getElementById('footerTxt').innerHTML='Already have an account? <a href="login.html">Login</a>';
}
async function doSignup(){
  const btn=document.getElementById('signupBtn');
  btn.disabled=true;btn.textContent='Creating account...';
  const body={name:document.getElementById('rName').value.trim(),email:document.getElementById('rEmail').value.trim(),password:document.getElementById('rPass').value,state:document.getElementById('rState').value,village:document.getElementById('rVillage').value.trim(),crops:selCrops};
  try{
    const res=await fetch('/api/auth/signup',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const d=await res.json();
    if(!d.success){showErr(d.message);btn.disabled=false;btn.textContent='Create Account';return;}
    localStorage.setItem('sf_token',d.token);localStorage.setItem('sf_user',JSON.stringify(d.user));
    showSuc('Welcome, '+d.user.name+'! 🎉 Redirecting...');
    setTimeout(()=>window.location.href='index.html',1100);
  }catch{showErr('Connection error. Please try again.');btn.disabled=false;btn.textContent='Create Account';}
}
if(localStorage.getItem('sf_token'))window.location.href='index.html';
</script>
</body>
</html>
